name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: bitcoin-shard-listener

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/bitcoin-shard-common
          path: bitcoin-shard-common

      - uses: actions/setup-go@v6
        with:
          go-version-file: bitcoin-shard-listener/go.mod

      - name: Use local bitcoin-shard-common
        working-directory: bitcoin-shard-listener
        run: go mod edit -replace github.com/lightwebinc/bitcoin-shard-common=../bitcoin-shard-common

      - name: go mod tidy check
        working-directory: bitcoin-shard-listener
        run: |
          go mod tidy
          go mod edit -dropreplace github.com/lightwebinc/bitcoin-shard-common
          git diff --exit-code go.mod
          go mod edit -replace github.com/lightwebinc/bitcoin-shard-common=../bitcoin-shard-common

      - name: Build
        working-directory: bitcoin-shard-listener
        run: go build -buildvcs=false ./...

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: bitcoin-shard-listener

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/bitcoin-shard-common
          path: bitcoin-shard-common

      - uses: actions/setup-go@v6
        with:
          go-version-file: bitcoin-shard-listener/go.mod

      - name: Use local bitcoin-shard-common
        working-directory: bitcoin-shard-listener
        run: go mod edit -replace github.com/lightwebinc/bitcoin-shard-common=../bitcoin-shard-common

      - name: govulncheck
        working-directory: bitcoin-shard-listener
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: bitcoin-shard-listener

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/bitcoin-shard-common
          path: bitcoin-shard-common

      - uses: actions/setup-go@v6
        with:
          go-version-file: bitcoin-shard-listener/go.mod

      - name: Use local bitcoin-shard-common
        working-directory: bitcoin-shard-listener
        run: go mod edit -replace github.com/lightwebinc/bitcoin-shard-common=../bitcoin-shard-common

      - name: go vet
        working-directory: bitcoin-shard-listener
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: bitcoin-shard-listener

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: bitcoin-shard-listener

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/bitcoin-shard-common
          path: bitcoin-shard-common

      - uses: actions/checkout@v6
        with:
          repository: lightwebinc/bitcoin-shard-proxy
          path: bitcoin-shard-proxy

      - uses: actions/setup-go@v6
        with:
          go-version-file: bitcoin-shard-listener/go.mod

      - name: Use local bitcoin-shard-common
        working-directory: bitcoin-shard-listener
        run: go mod edit -replace github.com/lightwebinc/bitcoin-shard-common=../bitcoin-shard-common

      - name: Unit tests
        working-directory: bitcoin-shard-listener
        run: go test -race ./...

      - name: Install curl
        run: sudo apt-get install -y --no-install-recommends curl

      - name: E2E test
        working-directory: bitcoin-shard-listener
        run: make test-e2e
